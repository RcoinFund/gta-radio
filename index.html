<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GTA-Style Radio Web App — tune into virtual radio stations with a cinematic dial interface." />
  <title>GTA Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Ambient Background -->
  <div id="app-background" class="app-background">
    <div class="bg-grain"></div>
    <div class="bg-glow"></div>
  </div>

  <!-- ===== CLICK-TO-START OVERLAY ===== -->
  <div id="start-overlay" class="start-overlay">
    <div class="overlay-content">
      <div class="overlay-logo">
        <span class="logo-gta">GTA</span>
        <span class="logo-radio">RADIO</span>
      </div>
      <p class="overlay-text">Loading stations...</p>
      <div class="overlay-pulse"></div>
    </div>
  </div>

  <!-- ===== STATION WHEEL (HUD) ===== -->
  <div id="station-wheel" class="station-wheel">
    <!-- wheel-ring is injected by stationWheel.js -->
  </div>

  <!-- ===== DIAL DRAG AREA ===== -->
  <div id="dial-area" class="dial-area">
    <div class="dial-knob">
      <div class="dial-tick"></div>
      <div class="dial-label">TUNE</div>
    </div>
  </div>

  <!-- ===== NOW PLAYING CARD ===== -->
  <div id="now-playing" class="now-playing">
    <div class="np-accent-bar"></div>
    <div class="np-content">
      <span class="np-icon"></span>
      <div class="np-text">
        <span class="np-station-name"></span>
        <span class="np-track-name"></span>
        <span class="np-genre"></span>
      </div>
    </div>
  </div>

  <!-- ===== STATION LIST (ambient) ===== -->
  <div id="station-list" class="station-list"></div>

  <!-- ===== DOWNLOADS MENU (Upper Right) ===== -->
  <div id="download-container" class="download-container">
    <button id="download-trigger" class="download-trigger" title="Download Apps & Assets">
      <span class="dl-trigger-label">DOWNLOAD</span>
    </button>
    <div id="dl-menu" class="dl-menu">
      <a href="https://github.com/RcoinFund/gta-radio/releases/download/v1.0.0/Radio-App-1.0.0.exe" class="dl-item" download>
        <span class="dl-icon">🖥️</span>
        <div class="dl-info">
          <span class="dl-name">Radio App v1.0.0</span>
          <span class="dl-desc">Windows Desktop Version</span>
        </div>
      </a>
      <a href="https://github.com/RcoinFund/gta-radio/releases/download/v1.0.0/Radio-App.apk" class="dl-item" download>
        <span class="dl-icon">📱</span>
        <div class="dl-info">
          <span class="dl-name">Radio App v1.0.0</span>
          <span class="dl-desc">Android APK Version</span>
        </div>
      </a>
      <a href="https://github.com/RcoinFund/gta-radio/releases/download/v1.0.0/Test-Library.zip" class="dl-item" download>
        <span class="dl-icon">📦</span>
        <div class="dl-info">
          <span class="dl-name">Test Library</span>
          <span class="dl-desc">Example Radio Stations</span>
        </div>
      </a>
    </div>
  </div>

  <!-- ===== VOLUME CONTROL ===== -->
  <div id="volume-control" class="volume-control">
    <span class="volume-icon">🔊</span>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" />
  </div>

  <!-- ===== CONTROLS HINT ===== -->
  <div class="controls-hint">
    <span>Scroll · Arrow Keys · 1–9 · F Fullscreen · M Mute · Drag Dial</span>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
